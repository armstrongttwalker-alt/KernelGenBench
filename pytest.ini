[pytest]
# Test discovery patterns
testpaths = test
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --strict-config
    -ra
    --color=yes

# Markers for organizing tests
markers =
    unit: Unit tests that test individual components
    integration: Integration tests that test multiple components together
    slow: Tests that take a long time to run
    gpu: Tests that require GPU
    imports: Tests that verify imports work correctly
    structure: Tests that verify directory/file structure

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Coverage options (when running with --cov)
# Use: pytest --cov=src --cov-report=html
# Or: pytest --cov=src --cov-report=term-missing

# Timeout for tests (requires pytest-timeout)
# timeout = 300

# Ignore certain directories
norecursedirs =
    .git
    .tox
    dist
    build
    *.egg
    old_bench
    cache
    output
    runs
    debug_log
    docs

# Python path setup
pythonpath = src

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
